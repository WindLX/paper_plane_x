name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Version metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check synchronized versions
        run: |
          python scripts/sync_version.py
          git diff --exit-code

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper_plane_x_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper_plane_x_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: paper_plane_x_frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build standalone frontend
        run: pnpm build

      - name: Build backend-hosted console
        run: pnpm build:console:fast

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper_plane_x_cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src tests

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build

  zotero:
    name: Zotero
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paper_plane_x_zotero
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: paper_plane_x_zotero/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Build plugin
        run: npm run build

      - name: Test
        run: npm run test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-ci-build
          path: paper_plane_x_zotero/.scaffold/build

  docker:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: paper_plane_x_backend/Dockerfile
          push: false
          tags: paper-plane-x-backend:ci
