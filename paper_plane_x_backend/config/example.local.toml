# Local configuration example for Paper Plane X backend
# Usage:
# 1) Copy and modify this file
# 2) Set PPX_CONFIG_FILE to this file path
# 3) Pass API key with env var LLM__API_KEY
APP_NAME = "Paper Plane X (Local)"
DEBUG = true
LOG_LEVEL = "INFO"
HOST = "127.0.0.1"
PORT = 8000
DATA_DIR = "./data"
PROMPTS_DIR = "./prompts"
DATABASE_URL = "sqlite:///./data/app.db"
MINERU_BASE_URL = "http://localhost:7860"
MINERU_OUTPUT_DIR = "./data/papers"
DATA_PROCESS_MAX_RETRIES = 3
DATA_PROCESS_WORKER_COUNT = 2

[LLM]
model = "deepseek-chat"
base_url = "https://api.deepseek.com/v1"
api_key = ""
temperature = 0.7
max_tokens = 4096
timeout = 60.0
is_vlm = false

[AGENT_LLM.extraction]
model = "deepseek-chat"
temperature = 0.3

[AGENT_LLM.fact_check]
model = "deepseek-chat"
temperature = 0.1
