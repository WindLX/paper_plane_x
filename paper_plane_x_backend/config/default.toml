# Paper Plane X backend default configuration
# You can override this file path via env var: PPX_CONFIG_FILE=/abs/path/to/your.toml
app_name = "Paper Plane X"
debug = false
host = "127.0.0.1"
port = 8000
data_dir = "./data"
prompts_dir = "./prompts"
database_url = "sqlite:///./data/app.db"

[log]
level = "DEBUG"
app_only = true
to_file = true
file_path = "./data/logs/backend.log"
file_max_bytes = 10485760
file_backup_count = 5

[mineru]
base_url = "http://localhost:7860"
output_dir = "./data/papers"

[data_process]
max_retries = 3
worker_count = 5
shutdown_timeout = 5.0
task_max_seconds = 600.0

[llm]
model = "deepseek-v4-flash"
base_url = "https://api.deepseek.com/v1"
# pass api_key via env: PPX_LLM__API_KEY=sk-...
api_key = ""
temperature = 0.7
max_tokens = 8192
timeout = 180.0
thinking_enabled = false
# reasoning_effort = "high" # high/max for deepseek thinking mode
is_vlm = false

# Advanced vendor-specific request body passthrough.
# For DeepSeek thinking mode, setting thinking_enabled = true maps to:
# [llm.extra_body.thinking]
# type = "enabled"
[agent_llm.extraction]
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
thinking_enabled = true
reasoning_effort = "high"
temperature = 0.3
max_tokens = 8192

[agent_llm.analysis]
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
thinking_enabled = true
reasoning_effort = "high"
temperature = 0.3
max_tokens = 8192

[agent_llm.fact_check]
base_url = "https://api.deepseek.com/v1"
model = "deepseek-v4-flash"
temperature = 0.1
max_tokens = 8192
