# Paper Plane X backend default configuration
# You can override this file path via env var: PPX_CONFIG_FILE=/abs/path/to/your.toml
app_name = "Paper Plane X"
debug = false
log_level = "DEBUG"
log_app_only = true
log_to_file = true
log_file_path = "./data/logs/backend.log"
log_file_max_bytes = 10485760
log_file_backup_count = 5
host = "127.0.0.1"
port = 8000
data_dir = "./data"
prompts_dir = "./prompts"
database_url = "sqlite:///./data/app.db"
mineru_base_url = "http://localhost:7860"
mineru_output_dir = "./data/papers"
data_process_max_retries = 3
data_process_worker_count = 5
data_process_task_max_seconds = 600.0

[llm]
# DeepSeek recommended default model for text generation
# model = "deepseek-chat"
# model = "[星一]gemini-3-pro-preview"
model = "[星一]claude-4-6-sonnet"
# base_url = "https://api.deepseek.com/v1"
# base_url = "https://models.sjtu.edu.cn/api/v1"
base_url = "https://azhexing.com/v1"
# pass api_key via env: PPX_LLM__API_KEY=sk-...
api_key = ""
temperature = 0.7
max_tokens = 999999
timeout = 180.0
is_vlm = false

[agent_llm.extraction]
# model = "deepseek-chat"
model = "[星一]claude-4-6-sonnet"
temperature = 0.3

[agent_llm.analysis]
# model = "deepseek-chat"
model = "[星一]claude-4-6-sonnet"
temperature = 0.3

[agent_llm.fact_check]
# base_url = "https://api.deepseek.com/v1"
# model = "deepseek-chat"
model = "[星一]claude-4-6-sonnet"
temperature = 0.1
